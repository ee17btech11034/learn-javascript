<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorChange Project</title>
    <style>
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ul {
            display: grid;
            list-style-type: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;

        }
        li {
            display: flex;
            height: 50px;
            width: 250px;
            border: 2px solid cornflowerblue;
            align-items: center;
            justify-content: center;
        }
        a {
            text-decoration: none;

        }
        span {
            width: 100px;
            height: 90px;
            border: 2px dashed tomato;
            margin: 20px;
            padding: 20px;
            cursor: pointer;
        }
        .testing-container{
            border: 5px solid red;
            margin: 50px;
            width: 300px;
            height: 250px;

        }
    </style>
</head>
<body>
    <div class="container">
        <ul>
            <li> <a href="./project1.html"> Project 1: Color Change </a> </li>
            <li> <a href="./project2.html"> Project 2: Color Change </a> </li>
            <li> <a href="./project3.html"> Project 3: Color Change </a> </li>
            <li> <a href="./project4.html"> Project 4: Color Change </a> </li>
        </ul>
    </div>

    <h2>Project 1: Color Change</h2>
    <div class="buttons">
        <span onclick="colorChangeFunction(0)" id = "0" class="button">Color 1</span>
        <span onclick="colorChangeFunction(1)" id = "1" class="button">Color 2</span>
        <span onclick="colorChangeFunction(2)" id = "2" class="button">Color 3</span>
        <span onclick="colorChangeFunction(3)" id = "3" class="button">Color 4</span>
    </div>
    <div class="testing-container">
        Hello......
    </div>
    
</body>

<script>
    const colors = ["lightblue", "lightpink", "lightseagreen", "lightslategray"]
    // const buttons = document.querySelector(".buttons") //not a good idea
    const buttons = document.querySelectorAll(".button") //n
    // console.log(buttons[0])
    for (let i = 0; i < 4; i++){
        buttons[i].style.backgroundColor = colors[i]
    }
    const colorChangeDiv = document.querySelector(".testing-container")
    function colorChangeFunction(colorVal){
        colorChangeDiv.style.backgroundColor = colors[colorVal]
    }





    //Add Event listerner instead of onclick
    buttons.forEach((button) => {
        button.addEventListener('click', (e)=>{
            console.log("e: ", e)
            console.log("e: target :=> : ", e.target)
            //we can get id or any attribute from here.
        })
    })
</script>

</html>
