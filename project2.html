    <div class="form-container">

            <div style="margin: 20px;">
                <label for="user-name">Name:</label>

            </div>
            <div style="margin: 20px;">
                <label for="weight">Weight (Kg):</label>
                <!-- <input type="number" step="0.01" style="-moz-appearance: textfield;" id="weight", placeholder="25.3">    -->
                <input type="number" step="0.01" min="0", style="-moz-appearance: textfield;" id="weight", placeholder="25.35" oninput="this.value = Math.max(0, this.value)">   
            </div>
            <div style="margin: 20px;">
                <label for="height">Height (feet):</label>
                <input type="number" step="0.01" min="0" max="9.00" style="-moz-appearance: textfield;" id="height", placeholder="5.32" oninput="this.value = Math.max(0, this.value)">   
            </div>
            <!-- <button type="submit"> Submit</button> We can use onclick on this but we want live changes -->
        </form>
    </div>
